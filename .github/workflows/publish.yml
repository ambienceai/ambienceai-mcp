name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Stage publish (requires 2FA approval on npmjs.com)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing — no npm token anywhere
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false # never cache in release builds

      - name: Update npm # >= 11.15.0 required for `npm stage publish`
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "package.json ($PKG_VERSION) != release tag ($TAG)"
            exit 1
          fi

      - name: Typecheck, test, and build
        run: npm run typecheck && npm test && npm run build

      - name: Stage publish
        run: npm stage publish
        env:
          # Provenance requires a CI OIDC provider, so it lives here rather
          # than in publishConfig (which would break local publishes)
          NPM_CONFIG_PROVENANCE: "true"
