name: Test Suite

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type checking
        run: npm run typecheck

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Generate coverage summary
        # Same-repo PRs only: fork PRs get a read-only token (can't comment),
        # and the comment body is built from output of untrusted PR code
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        id: coverage
        run: |
          COVERAGE_FILE="coverage/coverage-summary.json"

          if [ ! -f "$COVERAGE_FILE" ]; then
            echo "Coverage file not found!"
            exit 1
          fi

          # Extract coverage percentages using jq
          STATEMENTS=$(jq '.total.statements.pct' "$COVERAGE_FILE")
          BRANCHES=$(jq '.total.branches.pct' "$COVERAGE_FILE")
          FUNCTIONS=$(jq '.total.functions.pct' "$COVERAGE_FILE")
          LINES=$(jq '.total.lines.pct' "$COVERAGE_FILE")

          # Calculate overall coverage (average of all metrics)
          OVERALL=$(jq -n "($STATEMENTS + $BRANCHES + $FUNCTIONS + $LINES) / 4")

          # Generate coverage report markdown
          cat << EOF > coverage-report.md
          ## Coverage Report

          | Metric | Coverage |
          |--------|----------|
          | Statements | ${STATEMENTS}% |
          | Branches | ${BRANCHES}% |
          | Functions | ${FUNCTIONS}% |
          | Lines | ${LINES}% |
          | **Overall** | **${OVERALL}%** |

          <sub>Updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')</sub>
          EOF

      - name: Post coverage comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverageReport = fs.readFileSync('coverage-report.md', 'utf8');

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('## Coverage Report')
            );

            // Update existing comment or create new one
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: coverageReport
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: coverageReport
              });
            }

      - name: Archive test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: coverage/
          retention-days: 7
